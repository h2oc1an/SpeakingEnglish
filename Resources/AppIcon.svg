<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="blueGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5B8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#007AFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5856D6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 白色背景 -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="white"/>

  <!-- 声波曲线 -->
  <g transform="translate(512, 440)" fill="none" stroke="url(#blueGreen)" stroke-width="56" stroke-linecap="round">
    <path d="M -340 100 Q -170 -200 0 -200 Q 170 -200 340 100"/>
    <path d="M -250 100 Q -125 -60 0 -60 Q 125 -60 250 100" opacity="0.5"/>
  </g>

  <!-- 播放按钮 - 圆润三角形 -->
  <g transform="translate(512, 640)">
    <circle cx="0" cy="0" r="120" fill="url(#blueGreen)"/>
    <path d="M 100,0 L -50,-86 L -50,86 Z" fill="white" stroke="white" stroke-width="16" stroke-linejoin="round"/>
  </g>
</svg>
